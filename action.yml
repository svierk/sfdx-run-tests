name: SFDX Run Tests
description: GitHub composite action to run Salesforce Apex, LWC and Flow tests with code coverage reporting.

branding:
  icon: check-square
  color: blue

inputs:
  apex:
    description: Run Apex tests.
    required: false
    default: 'true'
  lwc:
    description: Run LWC (Jest) unit tests.
    required: false
    default: 'false'
  flow:
    description: Run Flow tests.
    required: false
    default: 'false'
  target-org:
    description: Username or alias of the target org (used for Apex and Flow tests). Not required if the default org is already set.
    required: false
  test-level:
    description: 'Test level for Apex and Flow tests. Permissible values: RunLocalTests, RunAllTestsInOrg, RunSpecifiedTests.'
    required: false
    default: RunLocalTests
  code-coverage:
    description: Collect code coverage for Apex and Flow tests.
    required: false
    default: 'true'
  apex-output-dir:
    description: Directory for Apex test result and coverage files. Contains test-result-codecoverage.json for Sonar.
    required: false
    default: ./tests/apex
  flow-output-dir:
    description: Directory for Flow test result and coverage files.
    required: false
    default: ./tests/flow
  lwc-test-command:
    description: >
      Command used to run the LWC Jest tests with coverage (must write an lcov report).
      Defaults to invoking sfdx-lwc-jest directly so it works on any SFDX project without
      relying on a specific package.json script. Override it to use your own test script,
      e.g. "npm run test:unit:coverage".
    required: false
    default: npx sfdx-lwc-jest --coverage
  lwc-lcov-path:
    description: Path to the lcov report produced by the LWC tests, used to report overall coverage.
    required: false
    default: ./coverage/lcov.info
  wait:
    description: Number of minutes to wait for the Apex and Flow test runs to complete.
    required: false
    default: '33'
  api-version:
    description: Override the api version used for Apex and Flow test api requests, for example '59.0'.
    required: false
  step-summary:
    description: Write a result section to the GitHub Actions job summary. Set to false to avoid collisions with a custom workflow summary.
    required: false
    default: 'true'

outputs:
  apex-outcome:
    description: Outcome of the Apex test run ("Passed"/"Failed"), empty if not run.
    value: ${{ steps.tests.outputs.apex-outcome }}
  apex-coverage:
    description: Overall Apex code coverage, empty if not run.
    value: ${{ steps.tests.outputs.apex-coverage }}
  lwc-outcome:
    description: Outcome of the LWC test run ("Passed"/"Failed"), empty if not run.
    value: ${{ steps.tests.outputs.lwc-outcome }}
  lwc-coverage:
    description: Overall LWC line coverage, empty if not run.
    value: ${{ steps.tests.outputs.lwc-coverage }}
  flow-outcome:
    description: Outcome of the Flow test run ("Passed"/"Failed"), empty if not run.
    value: ${{ steps.tests.outputs.flow-outcome }}
  flow-coverage:
    description: Overall Flow code coverage, empty if not run.
    value: ${{ steps.tests.outputs.flow-coverage }}

runs:
  using: composite
  steps:
    - name: Run Tests
      id: tests
      shell: bash
      env:
        APEX: ${{ inputs.apex }}
        LWC: ${{ inputs.lwc }}
        FLOW: ${{ inputs.flow }}
        TARGET_ORG: ${{ inputs.target-org }}
        TEST_LEVEL: ${{ inputs.test-level }}
        CODE_COVERAGE: ${{ inputs.code-coverage }}
        APEX_OUTPUT_DIR: ${{ inputs.apex-output-dir }}
        FLOW_OUTPUT_DIR: ${{ inputs.flow-output-dir }}
        LWC_TEST_COMMAND: ${{ inputs.lwc-test-command }}
        LWC_LCOV_PATH: ${{ inputs.lwc-lcov-path }}
        WAIT: ${{ inputs.wait }}
        API_VERSION: ${{ inputs.api-version }}
        STEP_SUMMARY: ${{ inputs.step-summary }}
      run: |
        set -uo pipefail

        overall_exit=0

        # Extract the JSON object from CLI output that may be prefixed with
        # npm/plugin JIT-install noise (some of which contains "{"). Keeps
        # everything from the first line that starts with "{".
        extract_json() { awk '/^[[:space:]]*\{/{f=1} f'; }

        # Make sure the flow plugin (used to run Flow tests) is available. It is
        # a JIT plugin whose first-use install dumps npm warnings onto stdout;
        # installing it up front keeps that noise out of the captured JSON. If a
        # previous step already installed it, the check skips reinstalling. The
        # install output is captured and only surfaced on failure to keep the
        # log clean. `flow` also appears under "Uninstalled JIT Plugins:", so
        # only the installed section (above that header) is inspected.
        ensure_flow() {
          if sf plugins 2>/dev/null | sed '/Uninstalled JIT Plugins:/,$d' | grep -q '^flow '; then
            return 0
          fi
          echo "Installing flow plugin..."
          local log
          if ! log="$(sf plugins install flow 2>&1)"; then
            echo "$log"
            echo "::error::Failed to install the flow plugin."
            return 1
          fi
        }

        apex_outcome=""; apex_coverage=""; apex_passing=""; apex_failing=""
        lwc_outcome=""; lwc_coverage=""
        flow_outcome=""; flow_coverage=""

        # ----------------------------- Apex tests -----------------------------
        if [[ "$APEX" == "true" ]]; then
          echo "▶️ Running Apex tests ($TEST_LEVEL)..."
          apex_args=(--test-level "$TEST_LEVEL" --output-dir "$APEX_OUTPUT_DIR" --wait "$WAIT")
          [[ "$CODE_COVERAGE" == "true" ]] && apex_args+=(--code-coverage)
          [[ -n "$TARGET_ORG" ]] && apex_args+=(--target-org "$TARGET_ORG")
          [[ -n "$API_VERSION" ]] && apex_args+=(--api-version "$API_VERSION")

          # `&& code=0 || code=$?` keeps the real exit code without letting the
          # inherited `set -e` kill the script when the test run reports failures.
          apex_result=$(sf apex run test "${apex_args[@]}" --json) && code=0 || code=$?
          echo "$apex_result" | jq '.result.summary // .'

          summary=$(echo "$apex_result" | jq '.result.summary // {}')
          apex_outcome=$(echo "$summary" | jq -r '.outcome // empty')
          apex_passing=$(echo "$summary" | jq -r '.passing // empty')
          apex_failing=$(echo "$summary" | jq -r '.failing // empty')
          apex_coverage=$(echo "$summary" | jq -r '.testRunCoverage // empty')

          if [[ $code -eq 0 ]]; then
            echo "✅ Apex tests passed: ${apex_passing:-0} passing (coverage: ${apex_coverage:-n/a})"
          else
            echo "❌ Apex tests failed: ${apex_failing:-?} failing"
            overall_exit=$code
          fi
        fi

        # ----------------------------- LWC tests ------------------------------
        if [[ "$LWC" == "true" ]]; then
          echo "▶️ Running LWC (Jest) tests..."
          bash -c "$LWC_TEST_COMMAND" && code=0 || code=$?

          # Derive overall line coverage from the lcov report (sum of hit/found lines).
          if [[ -f "$LWC_LCOV_PATH" ]]; then
            lwc_coverage=$(awk -F: '/^LF:/{f+=$2} /^LH:/{h+=$2} END{ if (f>0) printf "%.1f%%", (h/f)*100 }' "$LWC_LCOV_PATH")
          fi

          if [[ $code -eq 0 ]]; then
            lwc_outcome="Passed"
            echo "✅ LWC tests passed (coverage: ${lwc_coverage:-n/a})"
          else
            lwc_outcome="Failed"
            echo "❌ LWC tests failed"
            overall_exit=$code
          fi
        fi

        # ----------------------------- Flow tests -----------------------------
        if [[ "$FLOW" == "true" ]]; then
          echo "▶️ Running Flow tests ($TEST_LEVEL)..."

          # Ensure the flow plugin is present before capturing any --json output
          # (its JIT install would otherwise leak npm noise onto stdout).
          if ! ensure_flow; then
            overall_exit=1
          else
            # `sf flow run test` has no --wait flag; with --json it returns
            # immediately with only a testRunId (the run stays asynchronous).
            # Coverage/output-dir belong on `flow get test`, not `flow run test`.
            # So: kick off the run, then poll `flow get test` until it finishes.
            run_args=(--test-level "$TEST_LEVEL")
            [[ -n "$TARGET_ORG" ]] && run_args+=(--target-org "$TARGET_ORG")
            [[ -n "$API_VERSION" ]] && run_args+=(--api-version "$API_VERSION")

            run_json=$(sf flow run test "${run_args[@]}" --json) || true
            run_json=$(printf '%s\n' "$run_json" | extract_json)
            test_run_id=$(echo "$run_json" | jq -r '.result.testRunId // empty')

            if [[ -z "$test_run_id" ]]; then
              echo "❌ Could not start Flow test run"
              echo "$run_json" | jq '.'
              overall_exit=1
            else
              get_args=(--test-run-id "$test_run_id" --output-dir "$FLOW_OUTPUT_DIR")
              [[ "$CODE_COVERAGE" == "true" ]] && get_args+=(--code-coverage)
              [[ -n "$TARGET_ORG" ]] && get_args+=(--target-org "$TARGET_ORG")

              # Poll until the async run finishes (bounded by the `wait` input, in minutes).
              deadline=$(( SECONDS + WAIT * 60 ))
              flow_result=""
              while :; do
                flow_result=$(sf flow get test "${get_args[@]}" --json) || true
                flow_result=$(printf '%s\n' "$flow_result" | extract_json)
                flow_outcome=$(echo "$flow_result" | jq -r '.result.summary.outcome // empty')
                [[ -n "$flow_outcome" && "$flow_outcome" != "InProgress" ]] && break
                [[ $SECONDS -ge $deadline ]] && break
                sleep 15
              done

              echo "$flow_result" | jq '.result.summary // .'
              summary=$(echo "$flow_result" | jq '.result.summary // {}')
              flow_outcome=$(echo "$summary" | jq -r '.outcome // empty')
              flow_coverage=$(echo "$summary" | jq -r '.testRunCoverage // empty')

              if [[ "$flow_outcome" == "Passed" ]]; then
                echo "✅ Flow tests passed (coverage: ${flow_coverage:-n/a})"
              else
                echo "❌ Flow tests failed"
                overall_exit=1
              fi
            fi
          fi
        fi

        # ------------------------------- Outputs ------------------------------
        {
          echo "apex-outcome=${apex_outcome}"
          echo "apex-coverage=${apex_coverage}"
          echo "lwc-outcome=${lwc_outcome}"
          echo "lwc-coverage=${lwc_coverage}"
          echo "flow-outcome=${flow_outcome}"
          echo "flow-coverage=${flow_coverage}"
        } >> "$GITHUB_OUTPUT"

        # ---------------------------- Step summary ----------------------------
        if [[ "$STEP_SUMMARY" == "true" ]]; then
          {
            echo ""
            echo "### 🧪 Test results"
            echo ""
            echo "| Test type | Outcome | Coverage |"
            echo "| --- | --- | --- |"
            if [[ "$APEX" == "true" ]]; then
              echo "| Apex | ${apex_outcome:-n/a} | ${apex_coverage:-n/a} |"
            fi
            if [[ "$LWC" == "true" ]]; then
              echo "| LWC (Jest) | ${lwc_outcome:-n/a} | ${lwc_coverage:-n/a} |"
            fi
            if [[ "$FLOW" == "true" ]]; then
              echo "| Flow | ${flow_outcome:-n/a} | ${flow_coverage:-n/a} |"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        exit $overall_exit
